<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="9mcCTc9AiOisO8HCoe6h5mWLgOe5x8RPBR0_TMVsr2E" />
    <title>Yasser Store | Premium Accounts</title>

    <style>
        :root {
            --primary-color: #6366f1;
            --secondary-color: #a855f7;
            --accent-color: #ec4899;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --card-bg: rgba(255, 255, 255, 0.9);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            margin: 0;
            padding: 20px;
            color: #1f2937;
        }

        /* Header */
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            padding: 20px 40px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.1);
            margin-bottom: 40px;
            border: 1px solid rgba(255, 255, 255, 0.18);
        }

        .left-links a {
            margin-right: 20px;
            text-decoration: none;
            color: var(--primary-color);
            font-weight: 700;
            position: relative;
            transition: 0.3s;
        }

        .left-links a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -5px;
            left: 0;
            background: var(--accent-color);
            transition: 0.3s;
        }

        .left-links a:hover::after {
            width: 100%;
        }

        .center-title h1 {
            margin: 0;
            font-size: 2.2rem;
            background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        .center-title p {
            margin: 0;
            font-size: 0.8rem;
            color: #6b7280;
            font-weight: bold;
        }

        .right-contact p {
            margin: 0;
            font-size: 0.9rem;
            color: #4b5563;
            font-weight: 600;
            text-align: right;
        }

        @media (max-width: 768px) {
            .header-container { flex-direction: column; text-align: center; }
            .right-contact { margin-top: 15px; text-align: center; }
            .left-links { margin-bottom: 15px; }
        }

        /* Products Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .product-card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.3);
            position: relative;
            overflow: hidden;
            text-align: center;
        }

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            background: #fff;
        }

        .product-name {
            background: #f3f4f6;
            padding: 8px 20px;
            border-radius: 50px;
            display: inline-block;
            margin-bottom: 20px;
            font-weight: 800;
            color: #374151;
            font-size: 1rem;
        }

        
        .product-img {
            width: 100%;
            height: auto;
            max-height: 220px;
            object-fit: contain; 
            background: #e5e7eb;
            border-radius: 15px;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .product-card:hover .product-img {
            transform: scale(1.03);
        }

        .details-btn {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            border: none;
            color: #fff;
            padding: 12px 30px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            font-size: 1rem;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .details-btn:hover {
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5);
            filter: brightness(1.1);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            z-index: 9999;
        }

        .modal-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #fff;
            padding: 40px;
            border-radius: 30px;
            width: 320px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            animation: modalFade 0.4s ease-out;
        }

        @keyframes modalFade {
            from { opacity: 0; transform: translate(-50%, -60%); }
            to { opacity: 1; transform: translate(-50%, -50%); }
        }

        .modal-content p {
            font-size: 1.3rem;
            margin: 20px 0;
            color: #1f2937;
            display: flex;
            justify-content: space-between;
            border-bottom: 2px dashed #f3f4f6;
            padding-bottom: 10px;
        }

        .modal-content p strong {
            color: var(--primary-color);
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #9ca3af;
            font-size: 30px;
            cursor: pointer;
            transition: 0.3s;
        }

        .close-btn:hover {
            color: var(--accent-color);
        }
    </style>
</head>

<body>

<header>
    <div class="header-container">
        <div class="left-links">
            <a href="#">HOME</a>
            <a href="#">SALES</a>
        </div>
        <div class="center-title">
            <h1>Fun Store</h1>
            <p>Premium Accounts Seller</p>
        </div>
        <div class="right-contact">
            <p><u>:للتواصل</u></p>
            <p>📞 07.23.58.48.41</p>
            <p>✉️ yasseress522@gmail.com</p>
        </div>
    </div>
</header>

<div class="products-grid" id="grid"></div>

<div id="detailsModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeDetails()">&times;</span>
        <h2 style="margin-top: 0; color: var(--secondary-color);">Product Details</h2>
        <p><strong>Price:</strong> <span id="modal-price"></span></p>
        <p><strong>Score:</strong> <span id="modal-score"></span></p>
        <button class="details-btn" style="margin-top:20px;" onclick="closeDetails()">Close</button>
    </div>
</div>

<script>
const products = [
    { name: "cruyf 109", price: "50 DH", score: "3196" },
    { name: "messi 110", price: "85 DH", score: "3203" },
    { name: "ronaldinhio + FC 104", price: "30 DH", score: "3143" },
    { name: "bouchkach", price: "35 DH", score: "3173" },
    { name: "suariz 106", price: "85 DH", score: "3205" },
    { name: "Product 6", price: "80 DH", score: "2000" }
];

const images = [
    "my.jpg",
    "messi 110.jpg",
    "ronaldinhio.jpg",
    "bouchkach.jpg",
    "suariz.jpg",
    "product6.jpg"
];

const grid = document.getElementById('grid');

products.forEach((p, i) => {
    grid.innerHTML += `
        <div class="product-card">
            <div class="product-name">${p.name}</div>
            <img src="${images[i]}" class="product-img" onerror="this.src='https://via.placeholder.com/300x200?text=Image+Not+Found'">
            <button class="details-btn" onclick="openDetails('${p.price}','${p.score}')">View Details</button>
        </div>
    `;
});

function openDetails(price, score) {
    document.getElementById('modal-price').innerText = price;
    document.getElementById('modal-score').innerText = score;
    document.getElementById('detailsModal').style.display = 'block';
}

function closeDetails() {
    document.getElementById('detailsModal').style.display = 'none';
}

window.onclick = function(event) {
    if (event.target == document.getElementById('detailsModal')) {
        closeDetails();
    }
}
</script>

</body>
</html>
